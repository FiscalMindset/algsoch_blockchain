name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-blockchain:
    name: Blockchain (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - run: npm ci

      - run: npx hardhat compile

      - run: npx hardhat test

  test-frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

  test-backend:
    name: Backend (lint + syntax)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install web3>=6.0.0 python-dotenv>=1.0.0

      - name: Syntax check all .py files
        run: |
          python3 -m py_compile \
            manager_agent.py \
            worker_agent.py \
            launcher.py \
            debug_task.py \
            test_e2e.py

      - name: Verify web3 import
        run: python3 -c "from web3 import Web3; print('web3 OK')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run lint --if-present
        working-directory: frontend